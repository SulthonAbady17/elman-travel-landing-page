<section class="py-16 md:py-24 bg-gray-50 border-t border-gray-200" id="faq">
    <div class="container mx-auto px-4 max-w-4xl">
        <div class="text-center mb-12">
            <h2 class="text-2xl md:text-3xl lg:text-4xl font-bold text-cyan-700 mb-4">Pertanyaan yang Sering
                Diajukan</h2>
            <p class="text-gray-600">Temukan jawaban untuk pertanyaan umum seputar perjalanan umroh Anda.</p>
        </div>

        <div x-data="{ 
                    expanded: null,
                    showAll: false,
                    faqs: [
                        {
                            q: 'Bagaimana Cara Memilih Travel Umroh yang Terpercaya?',
                            a: 'Pilih travel umroh Surabaya yang:<br>• Memiliki izin resmi dari Kemenag RI<br>• Berpengalaman dan memiliki reputasi baik<br>• Menyediakan informasi yang jelas dan transparan<br>• Memberikan pelayanan yang profesional dan ramah<br><br>PT Elman Gemilang adalah travel umroh Surabaya yang amanah dan berpengalaman.'
                        },
                        {
                            q: 'Apa Saja yang Termasuk dalam Paket Umroh PT Elman Gemilang?',
                            a: 'Paket umroh kami umumnya meliputi:<br>• Tiket pesawat PP (Surabaya – Jeddah/Madinah)<br>• Visa umroh<br>• Akomodasi hotel di Makkah dan Madinah<br>• Transportasi lokal<br>• Makan 3x sehari<br>• Pembimbing ibadah (mutawwif)<br>• Air zamzam<br>• Asuransi perjalanan'
                        },
                        {
                            q: 'Berapa biaya Umroh?',
                            a: 'Biaya umroh bervariasi tergantung pada:<br>• Jenis paket (reguler, plus, Ramadhan, dll.)<br>• Durasi perjalanan<br>• Fasilitas hotel dan maskapai<br>• Waktu keberangkatan (musim ramai atau tidak)<br><br>PT Elman Gemilang menyediakan berbagai pilihan paket umroh Surabaya dengan harga yang transparan dan bersaing.'
                        },
                        {
                            q: 'Bagaimana Cara Mendaftar Umroh di PT Elman Gemilang?',
                            a: 'Anda bisa mengunjungi kantor kami di Surabaya atau menghubungi kami melalui telepon/WhatsApp. Tim kami akan membantu Anda dalam proses pendaftaran.'
                        },
                        {
                            q: 'Apa Saja yang Harus Dipersiapkan untuk Umroh?',
                            a: 'Persiapan umroh meliputi:<br>• Persiapan fisik (jaga kesehatan, olahraga)<br>• Persiapan mental (luruskan niat, pelajari manasik)<br>• Persiapan dokumen (paspor, visa, buku kuning vaksin)<br>• Perlengkapan pribadi (pakaian ihram, pakaian sehari-hari, obat-obatan)'
                        },
                        {
                            q: 'Vaksin Apa yang Wajib untuk Umroh?',
                            a: 'Vaksin meningitis adalah wajib bagi jamaah umroh. Vaksin ini untuk mencegah penyakit radang selaput otak. Sertifikat vaksin (Buku Kuning) menjadi syarat untuk mendapatkan visa umroh.'
                        },
                        {
                            q: 'Berapa lama durasi Umroh yang ideal?',
                            a: 'Durasi umroh yang umum adalah 9-12 hari. Durasi ini cukup untuk melaksanakan semua rukun umroh dan berziarah di Makkah dan Madinah.'
                        },
                        {
                            q: 'Apa itu Umroh?',
                            a: 'Umroh adalah ibadah sunnah yang dilakukan dengan mengunjungi Ka’bah di Makkah. Umroh sering disebut sebagai “haji kecil” karena memiliki rukun yang mirip dengan haji, namun waktunya bisa dilakukan kapan saja (kecuali hari Arafah dan hari-hari Tasyrik).'
                        },
                        {
                            q: 'Apa saja rukun Umroh?',
                            a: 'Rukun umroh ada 5:<br>1. Niat (Ihram)<br>2. Thawaf (mengelilingi Ka’bah 7 kali)<br>3. Sa’i (berlari-lari kecil antara bukit Shafa dan Marwah)<br>4. Tahallul (memotong rambut)<br>5. Tertib (melakukan rukun sesuai urutan)'
                        },
                        {
                            q: 'Apa syarat wajib Umroh?',
                            a: 'Syarat wajib umroh adalah:<br>• Islam<br>• Baligh (dewasa)<br>• Berakal sehat<br>• Merdeka (bukan budak)<br>• Mampu (fisik dan finansial)'
                        }
                    ]
                }" class="space-y-4">

            <template x-for="(faq, index) in faqs" :key="index">
                <div x-show="index < 3 || showAll" x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 transform -translate-y-4"
                    x-transition:enter-end="opacity-100 transform translate-y-0"
                    class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:border-cyan-200 transition-colors">
                    <button @click="expanded = expanded === index ? null : index"
                        class="w-full px-6 py-4 text-left flex justify-between items-center focus:outline-none bg-white hover:bg-gray-50 transition-colors">
                        <span class="font-semibold text-gray-800 pr-4" x-text="faq.q"></span>
                        <div class="bg-cyan-50 text-cyan-600 rounded-full p-1 flex-shrink-0">
                            <svg class="w-5 h-5 transform transition-transform duration-300"
                                :class="{ 'rotate-180': expanded === index }" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </button>

                    <div x-show="expanded === index" x-collapse class="px-6 pb-5 text-gray-600 text-sm leading-relaxed"
                        x-html="faq.a">
                    </div>
                </div>
            </template>

            <!-- View More Button -->
            <div class="pt-8 text-center" x-show="!showAll">
                <button @click="showAll = true"
                    class="inline-flex items-center justify-center border-2 border-cyan-600 text-cyan-600 hover:bg-cyan-600 hover:text-white px-8 py-3 rounded-full font-semibold transition-all duration-300 hover:shadow-md hover:-translate-y-0.5">
                    Lihat Lebih Banyak FAQ
                    <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                        </path>
                    </svg>
                </button>
            </div>
            <!-- Show Less Button -->
            <div class="pt-8 text-center" x-show="showAll" style="display: none;">
                <button
                    @click="showAll = false; expanded = null; document.getElementById('faq').scrollIntoView({behavior: 'smooth'})"
                    class="inline-flex items-center justify-center border-2 border-gray-300 text-gray-500 hover:bg-gray-100 hover:text-gray-700 px-8 py-3 rounded-full font-semibold transition-colors duration-300">
                    Tampilkan Lebih Sedikit
                    <svg class="w-4 h-4 ml-2 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</section>
